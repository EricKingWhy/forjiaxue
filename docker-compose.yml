# ForJiaXue full-stack deployment (T153)
# Usage: docker compose up --build -d
# Verify: docker compose ps  (both services Healthy)
#         curl http://localhost:3000/ForJiaXue
#         curl http://localhost:8000/api/health

services:
  backend:
    build:
      context: backend
    ports:
      - "8000:8000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_to_a_strong_password}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret_string}
      DATABASE_URL: sqlite:///./data/app.db
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
